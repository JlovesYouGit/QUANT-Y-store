# Quantum DevOps Toolchain Configuration

[general]
# General toolchain settings
debug = false
log_level = "INFO"
max_workers = 4

[compiler]
# Quantum compiler settings
default_optimization_level = 1
transpile_timeout = 300
enable_parallel_compilation = true

[optimization]
# Circuit optimization settings
enable_redundancy_removal = true
enable_gate_fusion = true
enable_commutation_optimization = true
max_optimization_passes = 10

[simulation]
# Quantum simulation settings
default_shots = 1024
default_backend = "statevector"
max_memory_mb = 8192
enable_gpu_simulation = false

[error_correction]
# Error correction settings
default_code_type = "surface"
enable_syndrome_measurement = true
error_threshold = 0.01

[devops]
# DevOps integration settings
ci_validation_enabled = true
cd_deployment_enabled = true
monitoring_enabled = true